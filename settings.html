<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SuperStock — Settings</title>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <style>
    .settings-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; max-width:900px; }
    .settings-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:1.6rem; }
    .settings-card h3 { font-size:0.95rem; margin-bottom:1rem; color:var(--text); }
    .settings-card p  { font-size:0.82rem; color:var(--muted); margin-bottom:0.5rem; }
    .settings-card .form-group { margin-bottom:0.9rem; }
    .danger-zone { border-color:rgba(248,113,113,0.3); }
    @media(max-width:600px){ .settings-grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body>

  <div id="header-placeholder"></div>

  <div class="layout">
    <div id="sidebar-placeholder"></div>

    <main id="main-content">

      <h2>⚙️ Settings</h2>
      <div class="settings-grid">

        <!-- Card 1: Alert Threshold -->
        <div class="settings-card">
          <h3>🔔 Alert Threshold</h3>
          <div class="form-group">
            <label>Warn when expiry is within (days)</label>
            <input type="number" id="s-threshold" min="1" max="365" value="7"/>
          </div>
          <div class="form-group">
            <label>Low stock warning below (units)</label>
            <input type="number" id="s-lowstock" min="0" value="10"/>
          </div>
          <button class="btn-primary" onclick="save()">Save</button>
        </div>

        <!-- Card 2: Store Information -->
        <div class="settings-card">
          <h3>🏪 Store Information</h3>
          <div class="form-group">
            <label>Store Name</label>
            <input type="text" id="s-store" placeholder="SuperStock Market"/>
          </div>
          <div class="form-group">
            <label>Manager Name</label>
            <input type="text" id="s-manager" placeholder="John Smith"/>
          </div>
          <button class="btn-primary" onclick="save()">Save</button>
        </div>

        <!-- Card 3: Notification Settings -->
        <div class="settings-card">
          <h3>📧 Notifications</h3>
          <p>Configure where daily expiry alerts are sent.</p>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="s-email" placeholder="manager@example.com"/>
          </div>
          <div class="form-group">
            <label>Telegram Bot Token</label>
            <input type="text" id="s-telegram-token" placeholder="123456:ABC-DEF..."/>
          </div>
          <div class="form-group">
            <label>Telegram Chat ID</label>
            <input type="text" id="s-telegram-chat" placeholder="-100123456789"/>
          </div>
          <div style="display:flex; gap:0.5rem;">
            <button class="btn-primary" onclick="saveNotifications()">Save</button>
            <button class="btn-secondary" onclick="testNotifyClick()">Test</button>
          </div>
        </div>

        <!-- Card 4: Change Password -->
        <div class="settings-card">
          <h3>👤 Change Password</h3>
          <div class="form-group">
            <label>Current Password</label>
            <input type="password" id="s-currentpass" placeholder="Current password"/>
          </div>
          <div class="form-group">
            <label>New Password</label>
            <input type="password" id="s-newpass" placeholder="New password"/>
          </div>
          <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" id="s-confirmpass" placeholder="Confirm password"/>
          </div>
          <button class="btn-primary" onclick="changePass()">Update Password</button>
        </div>

        <!-- Card 5: Category Management -->
        <div class="settings-card">
          <h3>🏷️ Categories</h3>
          <div id="category-list" style="display:flex; flex-wrap:wrap; gap:0.4rem; margin-bottom:1rem; max-height:100px; overflow-y:auto; padding:0.2rem;"></div>
          <div style="display:flex; gap:0.4rem; align-items:center;">
            <input type="text" id="new-category-name" placeholder="New Category..." style="flex:1; padding:0.4rem; font-size:0.85rem;" />
            <button class="btn-primary" style="padding:0.4rem 0.8rem; font-size:0.85rem;" onclick="addCategoryClick()">+ Add</button>
          </div>
        </div>

        <!-- Card 6: User Management (Admin Only) -->
        <div class="settings-card" id="user-management-card" style="display: none; grid-column:1/-1;">
          <h3>👥 User Management</h3>
          <div style="overflow-x:auto; margin-bottom:1rem; max-height:150px;">
            <table class="data-table" style="width:100%; text-align:left; border-collapse: collapse; font-size:0.8rem;">
              <thead>
                <tr style="background:var(--bg);">
                  <th style="padding:0.3rem; border-bottom:1px solid var(--border);">ID</th>
                  <th style="padding:0.3rem; border-bottom:1px solid var(--border);">Username</th>
                  <th style="padding:0.3rem; border-bottom:1px solid var(--border);">Role</th>
                  <th style="padding:0.3rem; border-bottom:1px solid var(--border);">Created</th>
                  <th style="padding:0.3rem; border-bottom:1px solid var(--border); text-align:center;">Action</th>
                </tr>
              </thead>
              <tbody id="user-list"></tbody>
            </table>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:0.4rem; align-items:center;">
            <input type="text" id="new-username" placeholder="Username" style="padding:0.4rem; font-size:0.8rem;"/>
            <input type="password" id="new-password" placeholder="Password" style="padding:0.4rem; font-size:0.8rem;"/>
            <select id="new-role" style="padding:0.4rem; font-size:0.8rem; border:1px solid var(--border); border-radius:var(--radius); background:var(--bg); color:var(--text);">
              <option value="Manager">Manager</option>
              <option value="Admin">Admin</option>
            </select>
            <button class="btn-primary" style="padding:0.4rem 0.8rem; font-size:0.85rem;" onclick="addUserClick()">+ Add</button>
          </div>
        </div>

        <!-- Card 7: Danger Zone -->
        <div class="settings-card danger-zone" style="grid-column:1/-1">
          <h3>⚠️ Danger Zone</h3>
          <p>Permanently delete all inventory data. This cannot be undone.</p>
          <button class="btn-danger" onclick="clearAll()">🗑️ Clear All Inventory Data</button>
        </div>

      </div>

    </main>
  </div>

  <div id="footer-placeholder"></div>
  <div id="toast" class="toast hidden"></div>

  <script src="assets/js/shared.js?v=2"></script>
  <script>
    (async function init() {
      await requireAuth();

      injectHeader('settings.html');
      injectFooter();

      // Load settings and fill in all form fields
      const s = await getSettings();
      document.getElementById('s-threshold').value      = s.expiry_threshold_days;
      document.getElementById('s-lowstock').value       = s.low_stock_threshold;
      document.getElementById('s-store').value          = s.store_name    || '';
      document.getElementById('s-manager').value        = s.manager_name  || '';
      document.getElementById('s-email').value          = s.notification_email || '';
      document.getElementById('s-telegram-token').value = s.notification_telegram_token   || '';
      document.getElementById('s-telegram-chat').value  = s.notification_telegram_chat_id || '';

      const products = await getProducts();
      updateAlertBadge(products);

      loadCategories();
      
      const user = getUser();
      if (user && user.role === 'Admin') {
        document.getElementById('user-management-card').style.display = 'block';
        loadUsers();
      }
    })();

    // Save threshold + store info
    async function save() {
      try {
        await saveSettings({
          expiry_threshold_days: document.getElementById('s-threshold').value,
          low_stock_threshold:   document.getElementById('s-lowstock').value,
          store_name:            document.getElementById('s-store').value.trim(),
          manager_name:          document.getElementById('s-manager').value.trim(),
        });
        showToast('✅ Settings saved!');
      } catch (err) {}
    }

    // Save notification settings
    async function saveNotifications() {
      const email  = document.getElementById('s-email').value.trim();
      const token  = document.getElementById('s-telegram-token').value.trim();
      const chatId = document.getElementById('s-telegram-chat').value.trim();

      // Build only the fields that have values
      // (sending empty string clears the field in the database)
      const data = {
        notification_email:            email,
        notification_telegram_token:   token,
        notification_telegram_chat_id: chatId,
      };

      try {
        await saveSettings(data);
        showToast('✅ Notification settings saved!');
      } catch (err) {
        showToast('❌ Could not save notification settings.', true);
      }
    }

    // Change password
    async function changePass() {
      const current = document.getElementById('s-currentpass').value;
      const np      = document.getElementById('s-newpass').value;
      const cp      = document.getElementById('s-confirmpass').value;

      if (!current) { showToast('⚠️ Enter your current password.', true); return; }
      if (!np)      { showToast('⚠️ Enter a new password.', true); return; }
      if (np !== cp) { showToast('❌ Passwords do not match.', true); return; }

      const formData = new FormData();
      formData.append('current_password', current);
      formData.append('new_password', np);

      try {
        await apiFetch('api/update_password.php', { method: 'POST', body: formData });
        showToast('✅ Password updated successfully!');
        document.getElementById('s-currentpass').value = '';
        document.getElementById('s-newpass').value     = '';
        document.getElementById('s-confirmpass').value = '';
      } catch (err) {}
    }

    // Clear all inventory
    async function clearAll() {
      if (!confirm('Delete ALL inventory data permanently? This cannot be undone.')) return;
      try {
        const products = await getProducts();
        if (products.length === 0) {
          showToast('ℹ️ No products to delete.');
          updateAlertBadge([]);
          return;
        }
        const ids = products.map(p => p.id);
        await bulkDeleteProducts(ids);
        showToast('🗑️ All inventory data cleared.');
        updateAlertBadge([]);
      } catch (err) {}
    }

    // Categories
    async function loadCategories() {
      try {
        const cats = await getCategories();
        const list = document.getElementById('category-list');
        list.innerHTML = cats.map(c => `
          <span style="display:inline-flex; align-items:center; background:rgba(56,189,248,0.15); color:var(--text); padding:0.2rem 0.5rem; border-radius:12px; font-size:0.75rem; border:1px solid rgba(56,189,248,0.3);">
            ${c.name}
            <button onclick="deleteCategoryClick(${c.id})" style="background:transparent; border:none; color:var(--danger); margin-left:0.3rem; font-size:0.8rem; cursor:pointer; padding:0; display:flex; align-items:center;" title="Delete">✖</button>
          </span>
        `).join('');
      } catch(err) {}
    }

    async function addCategoryClick() {
      const nameInput = document.getElementById('new-category-name');
      const name = nameInput.value.trim();
      if(!name) return showToast('⚠️ Enter a category name.', true);
      try {
        await addCategory(name);
        showToast('✅ Category added!');
        nameInput.value = '';
        loadCategories();
      } catch(err) {}
    }

    async function deleteCategoryClick(id) {
      if(!confirm('Delete this category?')) return;
      try {
        await deleteCategory(id);
        showToast('🗑️ Category deleted.');
        loadCategories();
      } catch(err) {}
    }

    // Users
    async function loadUsers() {
      try {
        const users = await getUsers();
        const tbody = document.getElementById('user-list');
        tbody.innerHTML = users.map(u => `
          <tr style="border-bottom:1px solid var(--border);">
            <td style="padding:0.3rem;">${u.id}</td>
            <td style="padding:0.3rem; font-weight:600;">${u.username}</td>
            <td style="padding:0.3rem;"><span style="background:rgba(129,140,248,0.15); color:var(--text); padding:0.1rem 0.4rem; border-radius:8px; font-size:0.7rem;">${u.role}</span></td>
            <td style="padding:0.3rem; color:var(--muted);">${u.created_at.split(' ')[0]}</td>
            <td style="padding:0.3rem; text-align:center;">
              <button class="btn-danger" style="padding:0.15rem 0.4rem; font-size:0.7rem; border-radius:4px;" onclick="deleteUserClick(${u.id})" title="Delete">✖</button>
            </td>
          </tr>
        `).join('');
      } catch(err) {}
    }

    async function addUserClick() {
      const u = document.getElementById('new-username').value.trim();
      const p = document.getElementById('new-password').value;
      const r = document.getElementById('new-role').value;
      if(!u || !p) return showToast('⚠️ Fill in all user fields.', true);
      try {
        await addUser({username: u, password: p, role: r});
        showToast('✅ User added!');
        document.getElementById('new-username').value = '';
        document.getElementById('new-password').value = '';
        loadUsers();
      } catch(err) {}
    }

    async function deleteUserClick(id) {
      if(!confirm('Delete this user?')) return;
      try {
        await deleteUser(id);
        showToast('🗑️ User deleted.');
        loadUsers();
      } catch(err) {}
    }

    // Test Notify
    async function testNotifyClick() {
      try {
        const res = await testNotify();
        if(res.ok) {
          showToast('✅ ' + (res.message || 'Notification sent!'));
        } else {
          showToast('⚠️ ' + (res.message || 'Notification failed.'), true);
        }
      } catch(err) {}
    }
  </script>
</body>
</html>
