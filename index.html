<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SuperStock — Login</title>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 30% 20%, rgba(56,189,248,0.12) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(129,140,248,0.12) 0%, transparent 50%),
                  var(--bg);
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.8rem 2.2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }
    .login-logo {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(90deg,#38bdf8,#818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.3rem;
      text-align: center;
    }
    .login-sub { color:var(--muted); font-size:0.88rem; text-align:center; margin-bottom:2rem; }
    .login-hint { font-size:0.76rem; color:var(--muted); margin-bottom:0.5rem; }
    .login-error { color:var(--danger); font-size:0.83rem; margin-top:0.75rem; text-align:center; }
    .login-box .form-group { margin-bottom:1rem; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="login-logo">🛒 SuperStock</div>
      <p class="login-sub">Supermarket Inventory Management</p>
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-user" placeholder="admin" required autocomplete="username"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-pass" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <p class="login-hint">Demo credentials: <strong>admin</strong> / <strong>admin123</strong></p>
        <button type="submit" class="btn-primary" style="width:100%">🔐 Login</button>
      </form>
      <p id="login-error" class="login-error hidden">❌ Invalid username or password.</p>
    </div>
  </div>
  <script src="assets/js/shared.js?v=2"></script>
  <script>
    (async function checkAlreadyLoggedIn() {
      try {
        await apiFetch('api/auth_check.php?_t=' + new Date().getTime());
        window.location.href = 'home.html';
      } catch (err) {
        // 401 = not logged in, stay on this page
      }
    })();

    async function handleLogin(event) {
      event.preventDefault();
      document.getElementById('login-error').classList.add('hidden');

      const username = document.getElementById('login-user').value.trim();
      const password = document.getElementById('login-pass').value;

      const formData = new FormData();
      formData.append('username', username);
      formData.append('password', password);

      try {
        await apiFetch('api/login.php', { method: 'POST', body: formData });
        window.location.href = 'home.html';
      } catch (err) {
        const errEl = document.getElementById('login-error');
        errEl.textContent = '❌ ' + (err.message || 'Invalid username or password.');
        errEl.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
